<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сплавы по реке Сарс</title>
    <meta name="description" content="Однодневные и двухдневные сплавы по живописной реке: цены, маршрут, как добраться, фото, ответы на вопросы и контакты организаторов." />
    <meta name="keywords" content="сплав по реке, рафтинг, водный поход, маршрут сплава, цены на сплав, тур выходного дня, активный отдых" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="Речные маршруты" />
    <link rel="canonical" href="https://example.com/" />
    <link rel="icon" href="public/sultanbektur-logo.svg" type="image/svg+xml" />
    <link rel="preload" href="/hero-river.webp" as="image" type="image/webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:site_name" content="Речные маршруты" />
    <meta property="og:title" content="Сплавы по реке: маршрут, цены и дикая природа" />
    <meta property="og:description" content="Сайт туристического сплава с расписанием, ценами, картой маршрута, фото галереей и FAQ." />
    <meta property="og:image" content="/hero-river.webp" />
    <meta property="og:url" content="https://example.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#164e63" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TouristTrip",
        "name": "Сплав по живописной реке",
        "description": "Организованный сплав по реке с инструктажем, экипировкой, питанием и сопровождением инструкторов.",
        "touristType": ["семьи", "компании друзей", "начинающие туристы"],
        "itinerary": {
          "@type": "ItemList",
          "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Сбор группы и инструктаж" },
            { "@type": "ListItem", "position": 2, "name": "Старт сплава" },
            { "@type": "ListItem", "position": 3, "name": "Остановка на обед у берега" },
            { "@type": "ListItem", "position": 4, "name": "Финиш и трансфер к точке сбора" }
          ]
        },
        "offers": {
          "@type": "AggregateOffer",
          "priceCurrency": "RUB",
          "lowPrice": "3500",
          "highPrice": "7900"
        },
        "provider": {
          "@type": "LocalBusiness",
          "name": "Речные маршруты",
          "telephone": "+7-912-900-45-26",
          "address": {
            "@type": "PostalAddress",
            "addressCountry": "RU"
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
